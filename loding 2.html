<!DOCTYPE html>
<html>
  <head>
    <title>LOADING</title>
    <link
      rel="icon"
      type="image/jpg"
      href="https://i.pinimg.com/736x/3f/1a/09/3f1a092cb5f149dd2719ac8aa1049807.jpg"
    />
  </head>
  <style>
    body {
      background-color: snow;
      justify-content: center;
      align-items: center;
      display: flex;
      font-style: italic;
      margin: 40%;
    }
    h3 {
      align-items: center;
      justify-content: center;
      margin: 10px;
      color: black;
    }

    .circle {
      margin: 40% auto;
      height: 40px;
      width: 40px;
      border: 5px solid;
      border-radius: 50%;
      border-top-color: whitesmoke;
      animation: spin 1s linear infinite;
    }
    @keyframes spin {
      100% {
        transform: rotate(360deg);
      }
    }
  </style>
  <body>
    <div class="item">
      <h3>Loading...</h3>
    </div>
    <div class="circle"></div>
  </body>
</html>
